<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backrooms Mobile</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}

#loading{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    z-index:100;
}
</style>
</head>
<body>

<div id="loading">Backrooms Loading...</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";
import { keys } from "./controls.js";
import { createMap } from "./map.js";
import { Entity } from "./entities.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff, 2);
light.position.set(0,5,0);
scene.add(light);

createMap(scene);

const entity = new Entity(scene);

camera.position.set(0,1.8,5);

window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

function animate(){

requestAnimationFrame(animate);

if(keys.up) camera.position.z -= 0.08;
if(keys.down) camera.position.z += 0.08;
if(keys.left) camera.position.x -= 0.08;
if(keys.right) camera.position.x += 0.08;

entity.update(camera);

renderer.render(scene,camera);

}

animate();

document.getElementById("loading").remove();

</script>

</body>
</html>
